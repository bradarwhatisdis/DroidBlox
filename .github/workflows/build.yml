# https://raw.githubusercontent.com/Novfensec/SAMPLE-KIVYMD-APP/refs/heads/main/.github/workflows/buildozer_action.yml

name: Build APK

on:
  workflow_dispatch:
    inputs:
      APK_TYPE:
        description: 'Type of APK to build (release or debug)'
        required: true
        default: debug

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # Used to cache dependencies with a timeout
      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u '+%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global
          restore-keys: |
            ${{ runner.os }}-buildozer-global

      - name: Cache Buildozer directory in app
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-app
          restore-keys: |
            ${{ runner.os }}-buildozer-app

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk
          restore-keys: |
            ${{ runner.os }}-android-sdk

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            libunwind-dev \
            zlib1g-dev
          sudo apt-get install -y \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            zlib1g-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            uuid-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good
          sudo apt-get install -y \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            automake

      # Set up Java 17 required by Gradle
      - name: Setup Java 17 required by Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # or 'zulu', 'liberica', etc.
          java-version: '17'

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' #set your python version

      # Install pip dependencies
      - name: Install pip dependencies
        run: |
          pip install --upgrade pip
          pip install 'setuptools<70' wheel 'Cython~=3.1.2'
          pip install -r requirements.txt
      
      ## Set env variables for P4A Android App Bundle (Signed) [Required by Google Play]
      ## https://gist.github.com/Guhan-SenSam/fa4ed215ef3419e7b3154de5cb71f641
      # - name: Set environment variables
      #   env:
      #     P4A_RELEASE_KEYSTORE: ${{ secrets.P4A_RELEASE_KEYSTORE }}
      #     P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.P4A_RELEASE_KEYSTORE_PASSWD }}
      #     P4A_RELEASE_KEYALIAS: ${{ secrets.P4A_RELEASE_KEYALIAS }}
      #     P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.P4A_RELEASE_KEYALIAS_PASSWD }}

      #   run: |
      #     echo "P4A_RELEASE_KEYSTORE=$P4A_RELEASE_KEYSTORE" >> $GITHUB_ENV
      #     echo "P4A_RELEASE_KEYSTORE_PASSWD=$P4A_RELEASE_KEYSTORE_PASSWD" >> $GITHUB_ENV
      #     echo "P4A_RELEASE_KEYALIAS=$P4A_RELEASE_KEYALIAS" >> $GITHUB_ENV
      #     echo "P4A_RELEASE_KEYALIAS_PASSWD=$P4A_RELEASE_KEYALIAS_PASSWD" >> $GITHUB_ENV
      
      # Clone & patch p4a to fix setuptools build_meta issue
      - name: Patch p4a for setuptools compatibility
        run: |
          git clone --depth=1 -b develop https://github.com/meowstrapper/python-for-android.git /tmp/p4a-patched
          # Pin setuptools<70 in hostpython to avoid build_meta removal in isolated env
          # This ensures the host python passes correct setuptools version to build backend
          sed -i 's/"pip", "setuptools"/"pip", "setuptools<70"/' \
            /tmp/p4a-patched/pythonforandroid/recipe.py
          # Add build-backend + pin setuptools<70 in pyjnius pyproject.toml
          PATCH_FILE=/tmp/p4a-patched/pythonforandroid/recipes/pyjnius/fix_backend.patch
          echo '--- a/pyproject.toml' > "$PATCH_FILE"
          echo '+++ b/pyproject.toml' >> "$PATCH_FILE"
          echo '@@ -1,6 +1,7 @@' >> "$PATCH_FILE"
          echo ' [build-system]' >> "$PATCH_FILE"
          echo '+build-backend = "setuptools.build_meta"' >> "$PATCH_FILE"
          echo ' requires = [' >> "$PATCH_FILE"
          echo '-    "setuptools>=58.0.0",' >> "$PATCH_FILE"
          echo '+    "setuptools>=58.0.0,<70",' >> "$PATCH_FILE"
          echo '     "wheel",' >> "$PATCH_FILE"
          echo '     "Cython~=3.1.2",' >> "$PATCH_FILE"
          echo ' ]' >> "$PATCH_FILE"
          sed -i 's/patches = \[/patches = ["fix_backend.patch", /' \
            /tmp/p4a-patched/pythonforandroid/recipes/pyjnius/__init__.py
          echo "P4A patched: setuptools<70 pinned + pyjnius build-backend added"

      # Configure buildozer to use patched p4a
      - name: Configure buildozer for patched p4a
        run: |
          echo "p4a.source_dir = /tmp/p4a-patched" >> buildozer.spec

      # Build with Buildozer
      - name: Build with Buildozer
        id: buildozer
        run: |
          yes | buildozer -v android ${{ github.event.inputs.APK_TYPE }}
        # yes | buildozer -v android release
        # run this for generating aab (Android App Bundle) [Required by google play]

      # Upload artifacts
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidblox-build
          path: bin/*.apk
          retention-days: 3
